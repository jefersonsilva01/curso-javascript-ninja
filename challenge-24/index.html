<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Challenge 24 - Calculator</title>
</head>
<body>
  <label for="calculadora">Calculadora</label>
  <input id="calculadora" type="text" value="0" readonly data-js="visor">
  <div class="buttons-numbers">
    <button value="0">0</button>
    <button value="1">1</button>
    <button value="2">2</button>
    <button value="3">3</button>
    <button value="4">4</button>
    <button value="5">5</button>
    <button value="6">6</button>
    <button value="7">7</button>
    <button value="8">8</button>
    <button value="9">9</button>
  </div>

  <div class="operations">
    <button value="+">+</button>
    <button value="-">-</button>
    <button value="x">x</button>
    <button value="÷">÷</button>
    <button value="=">=</button>
    <button value="ce">CE</button>
  </div>

  <script src="challenge-24.js"></script>
</body>
</html>
